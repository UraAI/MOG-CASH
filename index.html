<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mog Cash: Bull Run 3D</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #030308;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* HUD overlay */
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            color: #ffffff;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.9);
            pointer-events: none;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .hud-panel {
            background: rgba(10, 10, 25, 0.7);
            padding: 8px 16px;
            border-radius: 10px;
            border: 1px solid rgba(0, 255, 204, 0.3);
        }

        /* Active Ride Badge */
        #ride-selector {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 10px;
        }

        .ride-btn {
            background: rgba(5, 5, 15, 0.8);
            border: 1px solid #00ffcc;
            color: #00ffcc;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            transition: all 0.2s;
        }

        .ride-btn.active {
            background: #00ffcc;
            color: #000;
            box-shadow: 0 0 10px #00ffcc;
        }

        /* Screen States */
        .overlay-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(4, 4, 10, 0.95);
            color: white;
            z-index: 20;
            transition: opacity 0.3s ease;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* Splash Logo Styling */
        .cover-art-container {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            overflow: hidden;
            border: 5px solid #ffaa00;
            box-shadow: 0 0 30px rgba(255, 170, 0, 0.6);
            margin-bottom: 20px;
        }

        .cover-art-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-size: 42px;
            margin: 5px 0;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: center;
            background: linear-gradient(45deg, #ffaa00, #ff5500, #00ffcc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        p {
            font-size: 16px;
            color: #a0a0ba;
            margin-bottom: 25px;
        }

        button.action-btn {
            padding: 14px 40px;
            font-size: 20px;
            font-weight: bold;
            background: linear-gradient(135deg, #ffaa00, #00ffcc);
            border: none;
            border-radius: 30px;
            color: #030308;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0, 255, 204, 0.4);
            transition: transform 0.1s, box-shadow 0.2s;
        }

        button.action-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(0, 255, 204, 0.7);
        }

        #instructions {
            margin-top: 20px;
            font-size: 13px;
            color: #666680;
            text-align: center;
            line-height: 1.6;
        }

        /* Banner Notification for Bonus Round */
        #banner {
            position: absolute;
            top: 15%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(90deg, transparent, rgba(255,170,0,0.85), transparent);
            color: #fff;
            font-size: 32px;
            font-weight: 900;
            text-align: center;
            width: 100%;
            padding: 15px 0;
            letter-spacing: 5px;
            text-transform: uppercase;
            text-shadow: 0 0 10px #ffaa00;
            pointer-events: none;
            z-index: 15;
            display: none;
        }
    </style>
</head>
<body>

    <div id="hud">
        <div class="hud-panel">Lvl: <span id="level-val">1</span></div>
        <div class="hud-panel" id="mode-badge" style="color: #ffaa00;">MOG RUN</div>
        <div class="hud-panel">Score: <span id="score-val">0</span></div>
    </div>

    <div id="banner">BONUS ROUND! MOG TIME!</div>

    <div id="ride-selector">
        <button class="ride-btn active" onclick="setRide('truck')">1: Truck</button>
        <button class="ride-btn" onclick="setRide('car')">2: Car</button>
        <button class="ride-btn" onclick="setRide('rocket')">3: Rocket</button>
        <button class="ride-btn" onclick="setRide('plane')">4: Plane</button>
    </div>

    <div id="canvas-container"></div>

    <!-- Start Menu -->
    <div id="start-screen" class="overlay-screen">
        <div class="cover-art-container">
            <!-- Official MOG CASH Coin cover picture -->
            <img src="1000015645.png" alt="Mog Cash Cover">
        </div>
        <h1>MOG CASH: BULL RUN</h1>
        <p>Ride the green candles. Avoid the crash.</p>
        <button id="start-btn" class="action-btn">LAUNCH RUN</button>
        <div id="instructions">
            Use <b>A / D</b> or <b>LEFT / RIGHT Arrows</b> to steer<br>
            Press <b>SPACE</b> to Jump | Press <b>1-4</b> keys to change your Ride!
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="gameover-screen" class="overlay-screen hidden">
        <h1 style="background: linear-gradient(45deg, #ff0055, #ff5500); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">REKT!</h1>
        <p>Completed Level: <span id="final-level">1</span> &bull; Final Score: <span id="final-score">0</span></p>
        <button id="restart-btn" class="action-btn">STRIKE BACK</button>
    </div>

    <!-- Import Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // --- GAME CONFIGURATION ---
        const CONFIG = {
            laneWidth: 3.5,
            laneCount: 3,
            speed: 20,
            baseSpawnInterval: 800,
            jumpForce: 14,
            gravity: 36
        };

        // --- STATE MANAGEMENT ---
        let state = {
            isPlaying: false,
            score: 0,
            level: 1,
            isBonusRound: false,
            bonusRoundTimer: 0,
            currentLane: 1,
            targetX: 0,
            playerYVelocity: 0,
            isJumping: false,
            currentRide: 'truck', // truck, car, rocket, plane
            speedMultiplier: 1.0,
            obstacles: [],
            coins: [],
            lastSpawnTime: 0,
            lastCoinSpawnTime: 0
        };

        // --- THREE.JS SETUP ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x030308, 0.012);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 8.5);
        camera.lookAt(0, 1.2, -10);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        // --- LIGHTS ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffaa00, 1.0);
        dirLight.position.set(10, 25, 10);
        scene.add(dirLight);

        // --- TRACK AND GRID ---
        const trackWidth = CONFIG.laneWidth * CONFIG.laneCount;
        const trackGeo = new THREE.PlaneGeometry(trackWidth, 200, 1, 1);
        const trackMat = new THREE.MeshStandardMaterial({ color: 0x070710, roughness: 0.9 });
        const track = new THREE.Mesh(trackGeo, trackMat);
        track.rotation.x = -Math.PI / 2;
        track.position.set(0, 0, -50);
        scene.add(track);

        const gridHelper = new THREE.GridHelper(200, 80, 0x00ffcc, 0x111125);
        gridHelper.position.set(0, 0.02, -50);
        scene.add(gridHelper);

        // --- PROCEDURAL PLAYER VEHICLES ---
        const playerGroup = new THREE.Group();
        playerGroup.position.set(0, 0, 0);
        scene.add(playerGroup);

        let vehicleMesh = null;

        function rebuildVehicle() {
            if (vehicleMesh) playerGroup.remove(vehicleMesh);

            vehicleMesh = new THREE.Group();

            if (state.currentRide === 'truck') {
                // Low-poly Monster Truck (Blue/Gold theme)
                const cabin = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.6, 1.4), new THREE.MeshStandardMaterial({color: 0x1133aa}));
                cabin.position.y = 0.5;
                vehicleMesh.add(cabin);

                const bed = new THREE.Mesh(new THREE.BoxGeometry(0.85, 0.3, 0.6), new THREE.MeshStandardMaterial({color: 0xccaa00}));
                bed.position.set(0, 0.35, 0.7);
                vehicleMesh.add(bed);

                const wheels = [
                    [-0.55, 0.15, -0.5], [0.55, 0.15, -0.5],
                    [-0.55, 0.15, 0.5], [0.55, 0.15, 0.5]
                ];
                wheels.forEach(pos => {
                    const wh = new THREE.Mesh(new THREE.CylinderGeometry(0.32, 0.32, 0.25, 8), new THREE.MeshStandardMaterial({color: 0x111111}));
                    wh.rotation.z = Math.PI / 2;
                    wh.position.set(pos[0], pos[1], pos[2]);
                    vehicleMesh.add(wh);
                });
            } 
            else if (state.currentRide === 'car') {
                // Supercar
                const body = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.35, 1.7), new THREE.MeshStandardMaterial({color: 0xffaa00, roughness: 0.1}));
                body.position.y = 0.2;
                vehicleMesh.add(body);

                const cockpit = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.25, 0.8), new THREE.MeshStandardMaterial({color: 0x111111}));
                cockpit.position.set(0, 0.45, -0.1);
                vehicleMesh.add(cockpit);

                const spoiler = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.05, 0.25), new THREE.MeshStandardMaterial({color: 0x00ffcc}));
                spoiler.position.set(0, 0.5, 0.75);
                vehicleMesh.add(spoiler);
            } 
            else if (state.currentRide === 'rocket') {
                // Space Rocket (angled up slightly)
                const body = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.35, 1.6, 8), new THREE.MeshStandardMaterial({color: 0xdddddd}));
                body.rotation.x = Math.PI / 2;
                body.position.y = 0.5;
                vehicleMesh.add(body);

                const tip = new THREE.Mesh(new THREE.ConeGeometry(0.25, 0.5, 8), new THREE.MeshStandardMaterial({color: 0xff3300}));
                tip.rotation.x = -Math.PI / 2;
                tip.position.set(0, 0.5, -1.05);
                vehicleMesh.add(tip);

                // Side fins
                const finL = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.05, 0.4), new THREE.MeshStandardMaterial({color: 0xff3300}));
                finL.position.set(-0.4, 0.5, 0.4);
                vehicleMesh.add(finL);

                const finR = finL.clone();
                finR.position.x = 0.4;
                vehicleMesh.add(finR);
            } 
            else if (state.currentRide === 'plane') {
                // Airplane
                const fuselage = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.18, 1.5, 8), new THREE.MeshStandardMaterial({color: 0x00ffcc}));
                fuselage.rotation.x = Math.PI / 2;
                fuselage.position.y = 0.5;
                vehicleMesh.add(fuselage);

                const wings = new THREE.Mesh(new THREE.BoxGeometry(2.0, 0.04, 0.4), new THREE.MeshStandardMaterial({color: 0xffaa00}));
                wings.position.set(0, 0.5, -0.2);
                vehicleMesh.add(wings);

                const tail = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.4, 0.3), new THREE.MeshStandardMaterial({color: 0x00ffcc}));
                tail.position.set(0, 0.7, 0.6);
                vehicleMesh.add(tail);
            }

            playerGroup.add(vehicleMesh);
        }

        rebuildVehicle();

        // --- INTERACTION & RIDE SELECTION ---
        function setRide(rideType) {
            state.currentRide = rideType;
            rebuildVehicle();
            
            // UI Button Active visual toggling
            document.querySelectorAll('.ride-btn').forEach(btn => btn.classList.remove('active'));
            const idx = ['truck', 'car', 'rocket', 'plane'].indexOf(rideType);
            document.querySelectorAll('.ride-btn')[idx].classList.add('active');
        }

        window.addEventListener('keydown', (e) => {
            if (e.key === '1') setRide('truck');
            if (e.key === '2') setRide('car');
            if (e.key === '3') setRide('rocket');
            if (e.key === '4') setRide('plane');

            if (!state.isPlaying) return;

            if (e.key === 'a' || e.key === 'ArrowLeft') {
                if (state.currentLane > 0) state.currentLane--;
            } else if (e.key === 'd' || e.key === 'ArrowRight') {
                if (state.currentLane < CONFIG.laneCount - 1) state.currentLane++;
            } else if (e.key === ' ' && !state.isJumping) {
                state.playerYVelocity = CONFIG.jumpForce;
                state.isJumping = true;
            }
        });

        // --- SPARKING ELEMENTS ---
        const obstacleGeo = new THREE.BoxGeometry(1.2, 1.2, 1.2);
        const obstacleMat = new THREE.MeshStandardMaterial({ color: 0xff1133, emissive: 0x550000 });

        const coinGeo = new THREE.CylinderGeometry(0.5, 0.5, 0.1, 12);
        coinGeo.rotateX(Math.PI / 2);
        const coinMat = new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.9, roughness: 0.1 });

        function spawnObstacle() {
            if (state.isBonusRound) return; // No obstacles in bonus round!
            const lane = Math.floor(Math.random() * CONFIG.laneCount);
            const x = (lane - 1) * CONFIG.laneWidth;
            const obs = new THREE.Mesh(obstacleGeo, obstacleMat);
            obs.position.set(x, 0.6, -100);
            scene.add(obs);
            state.obstacles.push(obs);
        }

        function spawnCoin() {
            const lane = Math.floor(Math.random() * CONFIG.laneCount);
            const x = (lane - 1) * CONFIG.laneWidth;
            const coin = new THREE.Mesh(coinGeo, coinMat);
            coin.position.set(x, 0.5, -100);
            scene.add(coin);
            state.coins.push(coin);
        }

        // --- PROGRESSION & LEVEL BONUS ROUTINE ---
        function checkLevelProgression() {
            const lastLevel = state.level;
            // Level increments based on score milestones
            state.level = Math.floor(state.score / 250) + 1;
            document.getElementById('level-val').innerText = state.level;

            if (state.level > lastLevel) {
                // A new level was hit! Determine if it's a bonus stage trigger
                let triggerBonus = false;
                
                if (state.level <= 50) {
                    if (state.level % 10 === 0) triggerBonus = true;
                } else {
                    // post-50 logic: bonus round every 15 levels (65, 80, 95...)
                    if ((state.level - 50) % 15 === 0) triggerBonus = true;
                }

                if (triggerBonus) {
                    triggerBonusStage();
                }
            }
        }

        function triggerBonusStage() {
            state.isBonusRound = true;
            state.bonusRoundTimer = 6.0; // 6 seconds of frenzy
            
            // Clear current threats instantly
            state.obstacles.forEach(o => scene.remove(o));
            state.obstacles = [];

            // UI feedback
            const banner = document.getElementById('banner');
            const mode = document.getElementById('mode-badge');
            banner.style.display = 'block';
            mode.innerText = "⭐ BONUS ⭐";
            mode.style.color = "#ffd700";

            setTimeout(() => { banner.style.display = 'none'; }, 2000);
        }

        function endBonusStage() {
            state.isBonusRound = false;
            const mode = document.getElementById('mode-badge');
            mode.innerText = "MOG RUN";
            mode.style.color = "#ffaa00";
        }

        // --- UPDATE LOOP ---
        const clock = new THREE.Clock();

        function update(deltaTime) {
            if (!state.isPlaying) return;

            // Handle speed adjustment
            state.speedMultiplier = 1.0 + (state.level * 0.08);
            if (state.isBonusRound) {
                state.speedMultiplier *= 1.6; // Blazing fast during bonus
                state.bonusRoundTimer -= deltaTime;
                if (state.bonusRoundTimer <= 0) {
                    endBonusStage();
                }
            }

            // Scroll floor/grid
            const distance = CONFIG.speed * state.speedMultiplier * deltaTime;
            gridHelper.position.z += distance;
            if (gridHelper.position.z > 0) gridHelper.position.z = -50;

            // Lateral Steer Lerping
            state.targetX = (state.currentLane - 1) * CONFIG.laneWidth;
            playerGroup.position.x += (state.targetX - playerGroup.position.x) * 16 * deltaTime;
            playerGroup.rotation.z = -(state.targetX - playerGroup.position.x) * 0.15;

            // Vert Jump physics
            if (state.isJumping) {
                playerGroup.position.y += state.playerYVelocity * deltaTime;
                state.playerYVelocity -= CONFIG.gravity * deltaTime;

                if (playerGroup.position.y <= 0) {
                    playerGroup.position.y = 0;
                    state.isJumping = false;
                    state.playerYVelocity = 0;
                }
            }

            // Generate coins / hazards
            const now = Date.now();
            const spawnRate = CONFIG.baseSpawnInterval / state.speedMultiplier;
            
            if (!state.isBonusRound && (now - state.lastSpawnTime > spawnRate)) {
                spawnObstacle();
                state.lastSpawnTime = now;
            }

            // Coins spawn more frequently in bonus round
            const coinSpawnRate = state.isBonusRound ? 150 : 600;
            if (now - state.lastCoinSpawnTime > coinSpawnRate) {
                spawnCoin();
                state.lastCoinSpawnTime = now;
            }

            // Process Obstacles
            for (let i = state.obstacles.length - 1; i >= 0; i--) {
                const obs = state.obstacles[i];
                obs.position.z += CONFIG.speed * state.speedMultiplier * deltaTime;

                if (obs.position.z > 15) {
                    scene.remove(obs);
                    state.obstacles.splice(i, 1);
                    continue;
                }

                // Crash detection
                if (playerGroup.position.distanceTo(obs.position) < 1.3 && !state.isBonusRound) {
                    gameOver();
                }
            }

            // Process Coins
            for (let i = state.coins.length - 1; i >= 0; i--) {
                const coin = state.coins[i];
                coin.position.z += CONFIG.speed * state.speedMultiplier * deltaTime;
                coin.rotation.y += 3 * deltaTime;

                if (coin.position.z > 15) {
                    scene.remove(coin);
                    state.coins.splice(i, 1);
                    continue;
                }

                // Collect logic
                if (playerGroup.position.distanceTo(coin.position) < 1.2) {
                    scene.remove(coin);
                    state.coins.splice(i, 1);
                    state.score += state.isBonusRound ? 30 : 10;
                    document.getElementById('score-val').innerText = state.score;
                    checkLevelProgression();
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            update(Math.min(clock.getDelta(), 0.1));
            renderer.render(scene, camera);
        }

        function startGame() {
            state.isPlaying = true;
            state.score = 0;
            state.level = 1;
            state.currentLane = 1;
            state.isBonusRound = false;
            document.getElementById('score-val').innerText = '0';
            document.getElementById('level-val').innerText = '1';

            // Reset screens
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('gameover-screen').classList.add('hidden');
            document.getElementById('banner').style.display = 'none';

            state.obstacles.forEach(o => scene.remove(o));
            state.coins.forEach(c => scene.remove(c));
            state.obstacles = [];
            state.coins = [];
            
            setRide('truck');
        }

        function gameOver() {
            state.isPlaying = false;
            document.getElementById('final-score').innerText = state.score;
            document.getElementById('final-level').innerText = state.level;
            document.getElementById('gameover-screen').classList.remove('hidden');
        }

        document.getElementById('start-btn').addEventListener('click', startGame);
        document.getElementById('restart-btn').addEventListener('click', startGame);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
