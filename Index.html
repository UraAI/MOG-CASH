<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mog Cash - To The Moon!</title>
    <style>
        body { background: linear-gradient(135deg, #1e1b4b, #311042); color: #fff; font-family: 'Arial', sans-serif; text-align: center; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        h1 { color: #f59e0b; font-size: 3rem; margin-bottom: 5px; text-shadow: 0 0 10px rgba(245, 158, 11, 0.5); }
        .subtitle { font-style: italic; color: #a78bfa; margin-bottom: 30px; }
        .score-container { background: rgba(255, 255, 255, 0.1); padding: 15px 30px; border-radius: 15px; backdrop-filter: blur(5px); border: 1px solid rgba(255, 255, 255, 0.2); font-size: 1.5rem; margin-bottom: 30px; }
        #balance { color: #4ade80; font-weight: bold; font-size: 2rem; }
        .coin-btn { background: radial-gradient(circle, #fcd34d 0%, #d97706 100%); border: 8px solid #b45309; width: 200px; height: 200px; border-radius: 50%; cursor: pointer; font-size: 5rem; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(217, 119, 6, 0.4); transition: transform 0.1s ease; outline: none; }
        .coin-btn:active { transform: scale(0.95); }
        .shop { margin-top: 40px; width: 100%; max-width: 400px; }
        .upgrade-btn { background-color: #2563eb; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-size: 1.1rem; cursor: pointer; font-weight: bold; transition: background 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .upgrade-btn:disabled { background-color: #4b5563; cursor: not-allowed; }
    </style>
</head>
<body>
    <h1>MOG CASH</h1>
    <div class="subtitle">Community Driven | Bullish on MOG!</div>
    <div class="score-container">
        $MOG Balance: <span id="balance">0</span><br>
        <small style="font-size: 0.9rem; color: #cbd5e1;">Mogger Power: +<span id="power">1</span> per tap</small>
    </div>
    <button class="coin-btn" id="coin">🐂</button>
    <div class="shop">
        <h3>Boost Your Gains</h3>
        <button class="upgrade-btn" id="upgrade-btn" onclick="buyUpgrade()">
            Buy Shovel (Cost: <span id="upgrade-cost">50</span> $MOG)
        </button>
    </div>
    <script>
        let score = 0; let clickPower = 1; let upgradeCost = 50;
        const coin = document.getElementById('coin'); const balanceDisplay = document.getElementById('balance');
        const powerDisplay = document.getElementById('power'); const upgradeBtn = document.getElementById('upgrade-btn');
        const upgradeCostDisplay = document.getElementById('upgrade-cost');
        coin.addEventListener('click', () => { score += clickPower; updateUI(); });
        function buyUpgrade() { if (score >= upgradeCost) { score -= upgradeCost; clickPower += 1; upgradeCost = Math.round(upgradeCost * 1.5); updateUI(); } }
        function updateUI() { balanceDisplay.innerText = score; powerDisplay.innerText = clickPower; upgradeCostDisplay.innerText = upgradeCost; upgradeBtn.disabled = (score < upgradeCost); }
        updateUI();
    </script>
</body>
</html>
